name: Daily Instrument Analysis (Midday Gap Check)

# Extra safety net: backfill any missing forecast days even if today's batch exists.
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  gap-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check forecast coverage
        id: status
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: ${{ vars.SITE_URL || 'https://trading100.com' }}
        run: |
          set -euo pipefail
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET GitHub secret is required"
            exit 1
          fi

          HTTP_CODE=$(curl -s -o status.json -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/daily-forecasts?status=1&lookback=14")

          echo "Status response ($HTTP_CODE):"
          cat status.json
          echo ""

          if [ "$HTTP_CODE" != "200" ]; then
            exit 1
          fi

          NEEDS_BACKFILL=$(python3 -c "import json; d=json.load(open('status.json')); missing=d.get('missingDates') or []; print('true' if (not d.get('hasToday')) or len(missing)>0 else 'false')")
          echo "needsBackfill=$NEEDS_BACKFILL" >> "$GITHUB_OUTPUT"

      - name: Backfill forecast gaps
        if: steps.status.outputs.needsBackfill == 'true'
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: ${{ vars.SITE_URL || 'https://trading100.com' }}
        run: |
          set -euo pipefail
          node scripts/ensure-daily-forecasts.mjs --fallback-template --lookback-days 14

      - name: Coverage complete
        if: steps.status.outputs.needsBackfill != 'true'
        run: echo "14-day forecast coverage is complete — midday check skipped."
