name: Daily Instrument Analysis

# Subagent 1: 5 popular trading instrument analyses every day
on:
  schedule:
    # 06:00 UTC daily (~2pm MYT)
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  instrument-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Generate 5 daily instrument analyses
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: ${{ vars.SITE_URL || 'https://trading100.spartasoftofficial.workers.dev' }}
        run: |
          set -euo pipefail
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET GitHub secret is required"
            exit 1
          fi

          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/daily-forecasts")

          echo "Instrument analysis response ($HTTP_CODE):"
          cat response.json
          echo ""

          if [ "$HTTP_CODE" != "200" ]; then
            exit 1
          fi

          python3 -c "
          import json, sys
          d = json.load(open('response.json'))
          if d.get('generated', 0) < d.get('target', 5):
            print(f\"Warning: only {d.get('generated')} of {d.get('target')} analyses generated\")
          "
