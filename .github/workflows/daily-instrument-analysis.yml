name: Daily Instrument Analysis

# Cursor subagent spec: .cursor/agents/daily-instrument-analysis.md
# Publishes committed MDX drafts from content/drafts/forecasts/ to KV.
# Falls back to template generator when no drafts exist for today.
# Schedule: 06:00 UTC daily (~2pm MYT). Manual: workflow_dispatch.
on:
  schedule:
    # 06:00 UTC daily (~2pm MYT)
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  instrument-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Publish and verify today's forecasts
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: ${{ vars.SITE_URL || 'https://trading100.com' }}
        run: |
          set -euo pipefail
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET GitHub secret is required"
            exit 1
          fi

          node scripts/ensure-daily-forecasts.mjs --fallback-template --lookback-days 14
